<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Linkee</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="font-awesome.min.css">
</head>

<body class="login-page">
    <div class="login-container">
        <div class="logo">
            <svg class="logo-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M 20 20 Q 32 12 44 20 Q 56 28 48 40 Q 40 52 28 48 Q 16 44 20 32 Q 24 20 20 20" fill="none"
                    stroke="#667eea" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
                <circle cx="32" cy="20" r="3" fill="#667eea" />
                <circle cx="44" cy="32" r="3" fill="#764ba2" />
                <circle cx="32" cy="44" r="3" fill="#f093fb" />
                <circle cx="20" cy="32" r="3" fill="#667eea" />
            </svg>
            <span>Linkee</span>
        </div>
        <h1>Welcome</h1>
        <p>Connect with local service pros</p>

        <form id="loginForm" class="auth-form"><!--hello world this is my first comment -->
            <div class="form-group">
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary full-width">Login</button>
        </form>

        <div class="divider">
            <span>or</span>
        </div>

        <div class="auth-links">
            <p>Don't have an account? <a href="#" id="showRegister">Register here</a></p>
        </div>

        <!-- Register Form (hidden initially) -->
        <form id="registerForm" class="auth-form hidden">
            <div class="form-group">
                <label for="registerEmail">Email</label>
                <input type="email" id="registerEmail" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label for="registerPassword">Password</label>
                <input type="password" id="registerPassword" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary full-width">Create Account</button>
        </form>

        <div class="auth-links">
            <p>Already have an account? <a href="#" id="showLogin">Login here</a></p>
        </div>

    </div>

    <script>
        // Simple client-side auth
        let users = JSON.parse(localStorage.getItem('linkeeUsers')) || [];

        document.addEventListener('DOMContentLoaded', function () {
            setupAuth();
            checkExistingLogin();
        });

        function setupAuth() {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const showRegister = document.getElementById('showRegister');
            const showLogin = document.getElementById('showLogin');
            const goToHome = null;

            loginForm.addEventListener('submit', handleLogin);
            registerForm.addEventListener('submit', handleRegister);
            showRegister.addEventListener('click', showRegisterForm);
            showLogin.addEventListener('click', showLoginForm);
        }

        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim().toLowerCase();
            const password = document.getElementById('loginPassword').value;

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                alert('Please enter a valid email address');
                return;
            }

            const user = users.find(u => u.email === email && u.password === password);
            if (user) {
                localStorage.setItem('linkeeCurrentUser', JSON.stringify({ id: user.id, email: user.email }));
                alert('Login successful!');
                window.location.href = 'index.html';
            } else {
                alert('Invalid email or password');
            }
        }

        function handleRegister(e) {
            e.preventDefault();
            const email = document.getElementById('registerEmail').value.trim().toLowerCase();
            const password = document.getElementById('registerPassword').value;

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                alert('Please enter a valid email address');
                return;
            }

            if (users.find(u => u.email === email)) {
                alert('User already exists');
                return;
            }

            const newUser = { id: Date.now(), email, password };
            users.push(newUser);
            localStorage.setItem('linkeeUsers', JSON.stringify(users));
            localStorage.setItem('linkeeCurrentUser', JSON.stringify({ id: newUser.id, email: newUser.email }));
            alert('Account created & logged in!');
            window.location.href = 'index.html';
        }

        function handleGoogleLogin() {
            // Fake Google login - in real app use OAuth
            const googleUser = { id: 'google_' + Date.now(), email: 'user@google.com', name: 'Google User' };
            localStorage.setItem('linkeeCurrentUser', JSON.stringify(googleUser));
            window.location.href = 'index.html';
        }

        function showRegisterForm(e) {
            e.preventDefault();
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
        }

        function showLoginForm(e) {
            e.preventDefault();
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
        }

        function checkExistingLogin() {
            const currentUserStr = localStorage.getItem('linkeeCurrentUser');
            if (!currentUserStr) return;

            try {
                const user = JSON.parse(currentUserStr);
                if (user && user.email && typeof user.id === 'number') {
                    window.location.href = 'index.html';
                } else {
                    localStorage.removeItem('linkeeCurrentUser');
                }
            } catch (e) {
                localStorage.removeItem('linkeeCurrentUser');
                localStorage.removeItem('linkeeUsers');
            }
        }
    </script>
</body>

</html>
