<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services - Linkee</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="font-awesome.min.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-container">
                <div class="logo">
                    <i class="fas fa-link"></i>
                    <span>Linkee</span>
                </div>
                <ul class="nav-menu">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="jobs.html">Jobs</a></li>
                    <li><a href="post-job.html">Post Job</a></li>
                    <li><a href="login.html" class="login-link">Login</a></li>
                </ul>
                <div class="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </nav>
    </header>

    <section class="services page-section">
        <div class="container">
            <h2>Our Services</h2>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search services (plumber, electrician)...">
                <select id="categoryFilter">
                    <option value="">All Categories</option>
                    <option value="plumbing">Plumbing</option>
                    <option value="electrical">Electrical</option>
                    <option value="carpentry">Carpentry</option>
                    <option value="cleaning">Cleaning</option>
                    <option value="other">Other</option>
                </select>
                <button id="clearFilter"><i class="fas fa-times"></i></button>
            </div>
            <div id="servicesGrid" class="services-grid">
                <!-- JS populated -->
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2024 Linkee. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
