the<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linkee Logo - Modern SVG Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #2a1b3d 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            color: white;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            padding: 2rem 3rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            margin-bottom: 2rem;
        }

        .logo-svg {
            width: 64px;
            height: 64px;
            flex-shrink: 0;
        }

        .logo-text {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff 0%, #5b67ff 50%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.025em;
            line-height: 1.1;
        }

        .demo-info {
            text-align: center;
            max-width: 600px;
            opacity: 0.9;
            line-height: 1.6;
        }

        .demo-info h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #00d4ff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .usage {
            background: rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 1rem;
            font-family: 'SF Mono', monospace;
            font-size: 0.9rem;
        }

        @media (max-width: 480px) {
            .logo-container {
                flex-direction: column;
                gap: 1.5rem;
                text-align: center;
                padding: 2rem;
            }
            
            .logo-text {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <!-- SVG Logo Icon: Interconnected nodes forming network -->
        <svg class="logo-svg" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Stylized chain link symbol -->
            <defs>
                <linearGradient id="linkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#667eea"/>
                    <stop offset="50%" stop-color="#764ba2"/>
                    <stop offset="100%" stop-color="#f093fb"/>
                </linearGradient>
                <filter id="linkGlow" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
                    <feMerge> 
                        <feMergeNode in="coloredBlur"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
            </defs>

            <!-- Outer chain ring -->
            <path d="M 20 20 Q 32 12 44 20 Q 56 28 48 40 Q 40 52 28 48 Q 16 44 20 32 Q 24 20 20 20" 
                  fill="none" stroke="url(#linkGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#linkGlow)"/>

            <!-- Inner chain ring connection -->
            <path d="M 24 24 Q 32 18 40 24 Q 48 30 42 38 Q 36 46 28 42 Q 20 38 24 32 Q 28 24 24 24" 
                  fill="#ffffff" fill-opacity="0.2" stroke="url(#linkGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

            <!-- Link connection nodes -->
            <circle cx="32" cy="20" r="4" fill="url(#linkGrad)" stroke="#ffffff" stroke-width="1.5"/>
            <circle cx="44" cy="32" r="4" fill="#764ba2" stroke="#ffffff" stroke-width="1"/>
            <circle cx="32" cy="44" r="4" fill="#f093fb" stroke="#ffffff" stroke-width="1"/>
            <circle cx="20" cy="32" r="4" fill="#667eea" stroke="#ffffff" stroke-width="1"/>

            <!-- Subtle shine effect -->
            <ellipse cx="32" cy="26" rx="8" ry="2" fill="white" opacity="0.3"/>
            
            <!-- Pulse animation on center link -->
            <circle cx="32" cy="32" r="14" fill="none" stroke="#667eea" stroke-width="1" stroke-opacity="0.4">
                <animate attributeName="r" values="12;16;12" dur="3s" repeatCount="indefinite"/>
                <animate attributeName="stroke-opacity" values="0.4;0.1;0.4" dur="3s" repeatCount="indefinite"/>
            </circle>
        </svg>
        
        <div class="logo-text">Linkee</div>
    </div>

    <div class="demo-info">
        <h2>Modern Linkee Logo - SVG</h2>
        <p>Professional tech startup logo with interconnected network nodes. Fully scalable, responsive, transparent background.</p>
        <div class="usage">
            <strong>Copy SVG:</strong><br>
            Download logo.html or extract SVG code. Ready for web use!
        </div>
    </div>
</body>
</html>
